<div class="row justify-content-center mt-5">
    <div class="contenedor col-lg-4 p-4 rounded-5">

        <form class="text-center" [formGroup]="formularioRegistro" (ngSubmit)="enviarForm()">

            <p class="titulo-registro">Registrese</p>
            <label class="labels-registro form-label">Nombre</label>
            <input class="form-control mb-3"
                    type="text"
                    placeholder="Ingrese su nombre"
                    required
                    formControlName="nombre">

            <label class="labels-registro form-label">Apellido</label>
            <input class="form-control mb-3"
                    type="text"
                    placeholder="Ingrese su apellido"
                    required
                    formControlName="apellido">

            <label class="labels-registro form-label">Edad</label>
            <input class="form-control mb-3"
                    type="text"
                    placeholder="Ingrese su edad"
                    required
                    formControlName="edad">

            <label class="labels-registro form-label">Correo</label>
                <input class="form-control mb-3"
                    type="email"
                    placeholder="Ingrese su correo"
                    required email
                    formControlName="correo">

            <label class="labels-registro form-label">Contraseña</label>
                <input class="form-control mb-3"
                    type="text"
                    placeholder="Ingrese su contraseña"
                    required
                    formControlName="clave">

            <button class="btn btn-primary w-100 mb-3" type="submit">Registrarse</button>
        </form>

    </div>

</div>
