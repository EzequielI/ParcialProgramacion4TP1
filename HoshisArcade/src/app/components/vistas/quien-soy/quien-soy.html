<app-navbar></app-navbar>
<div class="container mt-5">
    <div class="row justify-content-center">
        @if (alumno) {
            <!--col-12 es para celular, col-md 8 para tablet y col-lg para pc -->
            <div class= "col-12 col-md-8 col-lg-6 d-flex justify-content-center">
                <div class="contenedor p-4 m-2 rounded-5 w-100">
                    <div class="row align-items-center">

                        <div class="col-8">
                            <p>Nombre: {{alumno.login}}</p>
                            <p>ID: {{alumno.id}}</p>
                            <p>Tipo:{{alumno.type}}</p>
                            <p>Creado el: {{alumno.created_at}}</p>
                        </div>
                        
                        <div class="col-4 d-flex justify-content-end">
                            <img class="img-fluid" [src]="alumno.avatar_url" alt="">
                        </div>
                    </div>
                </div>
            
            </div>
        }

    </div>

</div>

<button (click)="mostrarAlumno()">Mostrar</button>
